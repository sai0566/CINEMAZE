<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="./pages/feviconn.png">
    <title>Register</title>

    <link rel="stylesheet" href="./css/login.css">
</head>

<body>
    <div class="login-container">
        <div class="login-box">
            <h2>🎬 Register</h2>
            <form onsubmit="register(event)">
                <input id="username" type="text" placeholder="Enter your name" required autocomplete="off">
                <input id="email" type="email" placeholder="Enter your email" required autocomplete="off">
                <input id="password" type="password" placeholder="Enter your password" required autocomplete="off">
                <button type="submit">Register</button>
            </form>
            <p>Have an account? <a href="./login.html">Login</a></p>
        </div>
    </div>
    <script src="./script/register.js"></script>
</body>
</html>
